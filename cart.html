<!DOCTYPE html>
<html>
<head>
  <title>Your Cart - RoyalTime</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <h2>Your Cart</h2>
  <ul id="cart-items"></ul>
  <button onclick="checkout()">Checkout</button>

<!-- NAVBAR (unchanged) -->

<!-- HERO -->
<div class="page-hero">
  <h1>Your Collection Cart</h1>
  <p>Review your selected timepieces before checkout</p>
</div>

<!-- CART SECTION -->
<section class="cart-section">

  <div class="cart-summary" id="cart-summary">
    <h3>Order Summary</h3>

    <div class="summary-row">
      <span>Subtotal</span>
      <span id="cart-subtotal">$0</span>
    </div>

    <div class="summary-row">
      <span>Shipping</span>
      <span id="cart-shipping">$50</span>
    </div>

    <div class="summary-row total">
      <span>Total</span>
      <span id="cart-total">$0</span>
    </div>

    <!-- UPDATED BUTTON -->
    <button class="btn btn-gold" onclick="openCheckoutForm()">
      Proceed to Checkout
    </button>
  </div>

</section>

<!-- 🔥 CHECKOUT FORM MODAL -->
<div class="checkout-modal" id="checkout-form-modal">
  <div class="checkout-box">
    <h2>Enter Your Details</h2>

    <form id="checkout-form">
      <input type="text" id="cust-name" placeholder="Full Name" required>
      <input type="email" id="cust-email" placeholder="Email Address" required>
      <input type="tel" id="cust-phone" placeholder="Phone Number" required>
      <textarea id="cust-address" placeholder="Shipping Address" required></textarea>

      <button type="submit" class="btn btn-gold">Confirm Order</button>
      <button type="button" class="btn" onclick="closeCheckoutForm()">Cancel</button>
    </form>
  </div>
</div>

<!-- ✅ SUCCESS MODAL -->
<div class="success-modal" id="checkout-modal">
  <div class="success-modal-box">
    <h2>Order Confirmed!</h2>
    <p>Your order has been placed successfully.</p>
    <button class="btn btn-gold" onclick="closeSuccess()">Continue Shopping</button>
  </div>
</div>

<!-- 🔗 CONNECTED JS FILE -->
<script src="script.js"></script>

</body>
</html>
